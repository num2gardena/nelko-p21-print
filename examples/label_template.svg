<svg width="284" height="96" viewBox="0 0 284 96" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <rect width="284" height="96" fill="white" stroke="black" stroke-width="2"/>
  <!-- Text elements replacing placeholders from the CSV row -->
  <text x="10" y="35" font-family="sans-serif" font-size="16" font-weight="bold" fill="black">{Product}</text>
  <text x="10" y="65" font-family="sans-serif" font-size="14" fill="black">Price: {Price}</text>
  <!-- Image placeholder for the QR code. The id matches "qr_" + column name (URL) -->
  <image id="qr_URL" x="180" y="10" width="76" height="76" href="" />
</svg>
